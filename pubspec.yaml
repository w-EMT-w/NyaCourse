name: gdut_class_schedule
description: A Flutter timetable client for Guangdong University of Technology.
publish_to: "none"
version: 0.3.0+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  html: ^0.15.4
  intl: ^0.19.0
  encrypt: ^5.0.3
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.4
  home_widget: 0.7.0
  file_picker: ^11.0.2
  excel: ^4.0.6
  image_cropper: ^12.2.1
  permission_handler: ^12.0.1
  flutter_colorpicker: ^1.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.jpg
    - assets/settings_mascot.png
